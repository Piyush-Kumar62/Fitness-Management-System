spring.application.name=Fitness-Management-System
server.port=${PORT:8080}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PWD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
app.cors.allowed-origins=${ALLOWED_ORIGINS}
management.endpoints.web.exposure.include=health,info

# Email Configuration (Test Mode - Using Ethereal for testing)
spring.mail.host=${EMAIL_HOST:smtp.ethereal.email}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:test@ethereal.email}
spring.mail.password=${EMAIL_PASSWORD:test123}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false

# Application Email Settings
app.email.from=${EMAIL_FROM:noreply@fitnessapp.com}
app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.password.reset.expiration=3600000
# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# File Storage
app.file.upload-dir=./uploads
app.file.profile-pictures-dir=profile-pictures
app.file.progress-photos-dir=progress-photos
app.file.allowed-extensions=jpg,jpeg,png,gif,webp
app.file.max-file-size=5242880

# AWS S3 Configuration (Production)
aws.s3.enabled=${AWS_S3_ENABLED:false}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:fitness-app-files}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}

# Image Processing
app.image.max-width=1920
app.image.max-height=1920
app.image.thumbnail-width=200
app.image.thumbnail-height=200
app.image.compression-quality=0.85